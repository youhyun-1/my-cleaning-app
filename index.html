<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cleanly - 우리집 청소 알리미</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8F9FE; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 알림 배지 애니메이션 */
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .pulse-red { animation: pulse-red 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const Icon = {
            Sparkles: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            ),
            Plus: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ),
            Trash2: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            ),
            Sun: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            ),
            Calendar: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ),
            Repeat: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
            ),
            Clock: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ),
            X: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            ),
            Check: () => (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            ),
            Refresh: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            ),
            Bell: ({ active }) => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            )
        };

        const DAYS_KOR = ['일', '월', '화', '수', '목', '금', '토'];
        
        const MASTER_RECOMMENDATIONS = [
            { name: "매트리스 상하좌우 뒤집기", mode: "interval", frequencyDays: 90, desc: "매트리스 수명을 위해 3개월마다 뒤집어주세요" },
            { name: "주방 후드 필터 기름때 제거", mode: "interval", frequencyDays: 30, desc: "기름때는 화재의 원인이 될 수 있습니다" },
            { name: "세탁기 세탁조 살균 청소", mode: "interval", frequencyDays: 30, desc: "빨래에서 꿉꿉한 냄새가 난다면 필수" },
            { name: "침구류 일광 소독 및 세탁", mode: "interval", frequencyDays: 14, desc: "집먼지 진드기 방지를 위해 격주로 권장" }
        ];

        const getTodayString = () => {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        };

        const calculateStatus = (task) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let nextDate;

            if (task.mode === 'once') {
                nextDate = new Date(task.targetDate || getTodayString());
            } else if (task.mode === 'weekly') {
                let checkDate = new Date(task.lastCleaned === '2000-01-01' ? '2020-01-01' : task.lastCleaned);
                checkDate.setDate(checkDate.getDate() + 1);
                if (checkDate < today) checkDate = new Date(today);
                
                for (let i = 0; i < 14; i++) {
                    if (task.daysOfWeek?.includes(checkDate.getDay())) {
                        nextDate = new Date(checkDate);
                        break;
                    }
                    checkDate.setDate(checkDate.getDate() + 1);
                }
            } else {
                const last = new Date(task.lastCleaned === '2000-01-01' ? '2020-01-01' : task.lastCleaned);
                nextDate = new Date(last);
                if (task.lastCleaned === '2000-01-01') nextDate = new Date(today);
                else nextDate.setDate(nextDate.getDate() + Number(task.frequencyDays || 1));
            }
            
            if (!nextDate) nextDate = new Date(today);
            nextDate.setHours(0,0,0,0);
            
            const diffTime = nextDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return { status: 'overdue', days: Math.abs(diffDays) };
            if (diffDays === 0) return { status: 'today', days: 0 };
            return { status: 'upcoming', days: diffDays };
        };

        function App() {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('cleanly-v13-tasks');
                return saved ? JSON.parse(saved) : [];
            });

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('cleanly-v13-history');
                return saved ? JSON.parse(saved) : [];
            });

            const [notificationEnabled, setNotificationEnabled] = useState(() => {
                return localStorage.getItem('cleanly-notif') === 'true';
            });

            const [view, setView] = useState('main');
            const [modal, setModal] = useState({ open: false, mode: 'add', targetId: null });
            const [form, setForm] = useState({
                name: '',
                mode: 'interval',
                frequencyDays: 7,
                daysOfWeek: [],
                targetDate: getTodayString()
            });

            const [randomSeed, setRandomSeed] = useState(Date.now());

            useEffect(() => {
                localStorage.setItem('cleanly-v13-tasks', JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                localStorage.setItem('cleanly-v13-history', JSON.stringify(history));
            }, [history]);

            useEffect(() => {
                localStorage.setItem('cleanly-notif', notificationEnabled);
            }, [notificationEnabled]);

            const sortedTasks = useMemo(() => {
                return tasks.map(t => ({ ...t, ...calculateStatus(t) }))
                            .sort((a, b) => {
                                if (a.status === 'overdue' && b.status !== 'overdue') return -1;
                                if (b.status === 'overdue' && a.status !== 'overdue') return 1;
                                return a.days - b.days;
                            });
            }, [tasks]);

            const sendSystemNotification = useCallback((title, body) => {
                if (!("Notification" in window)) return;
                
                if (Notification.permission === "granted" && notificationEnabled) {
                    new Notification(title, { 
                        body, 
                        icon: "https://cdn-icons-png.flaticon.com/512/995/995053.png" 
                    });
                }
            }, [notificationEnabled]);

            const checkAndNotify = useCallback(() => {
                const overdue = sortedTasks.filter(t => t.status === 'overdue');
                const today = sortedTasks.filter(t => t.status === 'today');

                if (overdue.length > 0) {
                    sendSystemNotification("청소 지연 알림!", `${overdue[0].name} 등 ${overdue.length}개의 청소가 밀려있어요.`);
                } else if (today.length > 0) {
                    sendSystemNotification("오늘의 청소 알림", `${today[0].name} 등 ${today.length}개의 청소가 기다리고 있어요.`);
                }
            }, [sortedTasks, sendSystemNotification]);

            // 알림 권한 요청
            const toggleNotifications = () => {
                if (!("Notification" in window)) {
                    alert("이 브라우저는 알림 기능을 지원하지 않습니다.");
                    return;
                }

                if (Notification.permission === "granted") {
                    setNotificationEnabled(!notificationEnabled);
                } else {
                    Notification.requestPermission().then(permission => {
                        if (permission === "granted") {
                            setNotificationEnabled(true);
                            sendSystemNotification("알림 설정 완료!", "이제 청소 주기가 되면 알려드릴게요.");
                        }
                    });
                }
            };

            const progress = useMemo(() => {
                const todayTasks = tasks.map(t => ({ ...t, ...calculateStatus(t) }))
                                      .filter(t => t.status === 'today' || t.status === 'overdue');
                if (todayTasks.length === 0 && tasks.length > 0) return 100;
                if (tasks.length === 0) return 0;
                const completedTodayCount = tasks.filter(t => t.lastCleaned === getTodayString()).length;
                const totalTarget = todayTasks.length + completedTodayCount;
                return Math.round((completedTodayCount / totalTarget) * 100);
            }, [tasks]);

            const handleOpenModal = (mode, task = null) => {
                if (mode === 'edit' && task) {
                    setForm({ ...task });
                    setModal({ open: true, mode: 'edit', targetId: task.id });
                } else {
                    setForm({ name: '', mode: 'interval', frequencyDays: 7, daysOfWeek: [], targetDate: getTodayString() });
                    setModal({ open: true, mode: 'add', targetId: null });
                }
            };

            const saveTask = (customTask = null) => {
                const taskToSave = customTask || form;
                if (!taskToSave.name.trim()) return;
                
                if (modal.mode === 'add' || customTask) {
                    setTasks([...tasks, { ...taskToSave, id: Date.now(), lastCleaned: '2000-01-01' }]);
                } else {
                    setTasks(tasks.map(t => t.id === modal.targetId ? { ...taskToSave, id: t.id, lastCleaned: t.lastCleaned } : t));
                }
                setModal({ open: false, mode: 'add', targetId: null });
            };

            const completeTask = (id) => {
                const task = tasks.find(t => t.id === id);
                const now = new Date();
                const timeString = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
                setHistory([{ id: Date.now(), taskName: task.name, date: getTodayString(), time: timeString }, ...history].slice(0, 50));
                if (task.mode === 'once') setTasks(tasks.filter(t => t.id !== id));
                else setTasks(tasks.map(t => t.id === id ? { ...t, lastCleaned: getTodayString() } : t));
            };

            const PRESETS = [
                { label: '3일', value: 3 }, { label: '1주일', value: 7 },
                { label: '2주일', value: 14 }, { label: '1개월', value: 30 },
                { label: '3개월', value: 90 }, { label: '6개월', value: 180 }
            ];

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto relative overflow-hidden bg-[#F8F9FE]">
                    {/* Header */}
                    <header className="px-6 pt-8 pb-6 bg-white border-b border-slate-50 shrink-0 shadow-sm rounded-b-[40px] z-10">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-xl font-black text-blue-600 flex items-center gap-1.5 tracking-tighter">
                                <Icon.Sparkles /> CLEANLY
                            </h1>
                            <button 
                                onClick={toggleNotifications}
                                className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-black transition-all ${
                                    notificationEnabled 
                                    ? 'bg-blue-600 text-white' 
                                    : 'bg-slate-100 text-slate-400'
                                }`}
                            >
                                <Icon.Bell active={notificationEnabled} />
                                {notificationEnabled ? "알림 ON" : "알림 꺼짐"}
                            </button>
                        </div>
                        
                        <div className="flex justify-between items-end">
                            <div className="space-y-1">
                                <p className="text-4xl font-black text-slate-900 tracking-tight">
                                    {new Date().getDate()}<span className="text-lg text-slate-400 ml-1">일</span>
                                </p>
                                <p className="text-sm font-bold text-slate-400 uppercase">
                                    {new Date().getMonth() + 1}월 • {DAYS_KOR[new Date().getDay()]}요일
                                </p>
                            </div>
                            <div className="text-right">
                                <p className="text-[11px] font-black text-blue-500 mb-1">{progress}% 완료</p>
                                <div className="w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-blue-500 progress-bar" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="flex px-6 mt-6 gap-3 shrink-0">
                        <button onClick={() => setView('main')} className={`flex-1 py-3.5 rounded-2xl font-black text-sm transition-all ${view === 'main' ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white text-slate-400 border border-slate-100'}`}>할 일</button>
                        <button onClick={() => setView('history')} className={`flex-1 py-3.5 rounded-2xl font-black text-sm transition-all ${view === 'history' ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white text-slate-400 border border-slate-100'}`}>기록</button>
                    </nav>

                    {/* Content Area */}
                    <main className="flex-1 overflow-y-auto px-6 py-6 pb-32 no-scrollbar">
                        {view === 'main' ? (
                            <div className="space-y-8">
                                {/* 알림 테스트 영역 */}
                                {notificationEnabled && (
                                    <div className="bg-amber-50 rounded-2xl p-4 flex items-center justify-between border border-amber-100">
                                        <div className="flex items-center gap-3">
                                            <div className="w-8 h-8 bg-amber-200 rounded-full flex items-center justify-center text-amber-700 pulse-red">
                                                <Icon.Bell active />
                                            </div>
                                            <p className="text-xs font-bold text-amber-800">알림 작동 여부를 확인해볼까요?</p>
                                        </div>
                                        <button 
                                            onClick={checkAndNotify}
                                            className="text-[10px] font-black bg-amber-500 text-white px-3 py-1.5 rounded-lg shadow-sm"
                                        >
                                            테스트
                                        </button>
                                    </div>
                                )}

                                <section className="space-y-4">
                                    <h2 className="text-sm font-black text-slate-400 uppercase tracking-widest px-1">오늘의 청소</h2>
                                    {sortedTasks.length === 0 ? (
                                        <div className="py-12 text-center bg-white rounded-[32px] border border-dashed border-slate-200 opacity-40 font-bold">등록된 청소가 없습니다</div>
                                    ) : (
                                        sortedTasks.map(task => (
                                            <div key={task.id} className="bg-white rounded-[32px] p-6 shadow-sm border border-slate-100 flex items-center gap-4 active:scale-[0.98] transition-all" onClick={() => handleOpenModal('edit', task)}>
                                                <div className="flex-1">
                                                    <h3 className="font-black text-[17px] text-slate-800 leading-tight mb-2">{task.name}</h3>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`text-[10px] px-2 py-1 rounded-full font-black ${task.status === 'overdue' ? 'bg-red-50 text-red-500' : task.status === 'today' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                            {task.status === 'overdue' ? `지연 D+${task.days}` : task.status === 'today' ? '오늘' : `D-${task.days}`}
                                                        </span>
                                                        <span className="text-[10px] text-slate-300 font-bold flex items-center gap-1">
                                                            <Icon.Clock /> {task.mode === 'interval' ? `${task.frequencyDays}일 주기` : task.mode === 'weekly' ? '요일별' : '한 번'}
                                                        </span>
                                                    </div>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); completeTask(task.id); }} className="w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg bg-blue-600 text-white shadow-blue-100"><Icon.Check /></button>
                                            </div>
                                        ))
                                    )}
                                </section>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {history.length === 0 ? (
                                    <div className="py-12 text-center text-slate-400 font-bold">아직 청소 기록이 없습니다.</div>
                                ) : (
                                    history.map(h => (
                                        <div key={h.id} className="bg-white rounded-2xl p-4 flex items-center gap-4 border border-slate-100">
                                            <div className="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-500"><Icon.Check /></div>
                                            <div className="flex-1">
                                                <h4 className="text-sm font-black text-slate-800">{h.taskName}</h4>
                                                <p className="text-[10px] text-slate-400 font-medium mt-0.5">{h.date} • {h.time}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    {/* Floating Button */}
                    {view === 'main' && (
                        <button onClick={() => handleOpenModal('add')} className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full font-black shadow-2xl flex items-center gap-2 active:scale-95 transition-transform z-40">
                            <Icon.Plus /> 직접 추가
                        </button>
                    )}

                    {/* Modal */}
                    {modal.open && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex flex-col justify-end">
                            <div className="bg-white rounded-t-[40px] p-8 pb-10 animate-slide-up shadow-2xl max-h-[92vh] overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black text-slate-800">{modal.mode === 'add' ? '새 청소 추가' : '정보 수정'}</h3>
                                    <button onClick={() => setModal({ open: false, mode: 'add', targetId: null })} className="text-slate-300"><Icon.X /></button>
                                </div>

                                <div className="space-y-8">
                                    <div className="space-y-3">
                                        <label className="text-[11px] font-black text-slate-400 ml-1 uppercase">청소 항목 이름</label>
                                        <input 
                                            value={form.name}
                                            onChange={e => setForm({...form, name: e.target.value})}
                                            className="w-full bg-slate-50 rounded-2xl p-5 font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all" 
                                            placeholder="예: 싱크대 하부장 정리"
                                        />
                                    </div>

                                    <div className="p-6 bg-slate-50 rounded-[32px] border border-slate-100">
                                        <div className="space-y-6">
                                            <div className="flex items-center justify-between">
                                                <span className="text-sm font-black text-slate-600">수행 주기 설정</span>
                                                <div className="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-slate-200">
                                                    <input 
                                                        type="number"
                                                        value={form.frequencyDays}
                                                        onChange={e => setForm({...form, frequencyDays: e.target.value})}
                                                        className="w-12 text-center font-black text-blue-600 outline-none"
                                                    />
                                                    <span className="text-xs font-bold text-slate-400">일 마다</span>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-3 gap-2">
                                                {PRESETS.map(p => (
                                                    <button 
                                                        key={p.value}
                                                        onClick={() => setForm({...form, frequencyDays: p.value})}
                                                        className={`py-3 rounded-xl text-xs font-bold transition-all border ${
                                                            Number(form.frequencyDays) === p.value 
                                                            ? 'bg-blue-600 border-blue-600 text-white shadow-md' 
                                                            : 'bg-white border-slate-200 text-slate-500'
                                                        }`}
                                                    >
                                                        {p.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex gap-3 pt-2">
                                        {modal.mode === 'edit' && (
                                            <button 
                                                onClick={() => {
                                                    setTasks(tasks.filter(t => t.id !== modal.targetId));
                                                    setModal({ open: false, mode: 'add', targetId: null });
                                                }}
                                                className="bg-red-50 text-red-500 px-6 rounded-2xl border border-red-100 active:bg-red-100 transition-colors"
                                            >
                                                <Icon.Trash2 />
                                            </button>
                                        )}
                                        <button 
                                            onClick={() => saveTask()}
                                            className="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 active:scale-[0.98] transition-all"
                                        >
                                            {modal.mode === 'add' ? '등록 완료' : '저장 완료'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
