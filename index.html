<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cleanly - 우리집 청소 알리미</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8F9FE; margin: 0; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes toastIn {
            from { transform: translateY(-100%) translateX(-50%); opacity: 0; }
            to { transform: translateY(20px) translateX(-50%); opacity: 1; }
        }
        .animate-toast { animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .progress-bar { transition: width 0.5s ease; }
        .tap-active:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const Icon = {
            Sparkles: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            ),
            Plus: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ),
            Bell: ({ active }) => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill={active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            ),
            Check: () => (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            ),
            X: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            )
        };

        function App() {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('cleanly-v14-tasks');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: "거실 바닥 닦기", frequencyDays: 3, lastCleaned: '2020-01-01' },
                    { id: 2, name: "분리수거 하기", frequencyDays: 7, lastCleaned: '2020-01-01' }
                ];
            });

            const [toast, setToast] = useState(null);
            const [modal, setModal] = useState(false);
            const [formName, setFormName] = useState('');

            useEffect(() => {
                localStorage.setItem('cleanly-v14-tasks', JSON.stringify(tasks));
            }, [tasks]);

            // 알림 시스템 (가상 + 실제 병행)
            const showNotification = (title, message) => {
                // 1. 가상 알림 (무조건 표시)
                setToast({ title, message });
                setTimeout(() => setToast(null), 3500);

                // 2. 실제 시스템 알림 시도
                if ("Notification" in window) {
                    if (Notification.permission === "granted") {
                        new Notification(title, { body: message });
                    } else if (Notification.permission !== "denied") {
                        Notification.requestPermission().then(permission => {
                            if (permission === "granted") {
                                new Notification(title, { body: message });
                            }
                        });
                    }
                }
            };

            const completeTask = (id) => {
                const now = new Date();
                const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                setTasks(tasks.map(t => t.id === id ? { ...t, lastCleaned: todayStr } : t));
                showNotification("청소 완료!", "기록이 저장되었습니다. 수고하셨어요! ✨");
            };

            const addTask = () => {
                if (!formName.trim()) return;
                setTasks([...tasks, { id: Date.now(), name: formName, frequencyDays: 7, lastCleaned: '2020-01-01' }]);
                setFormName('');
                setModal(false);
                showNotification("새 항목 추가", `"${formName}" 항목이 리스트에 추가되었습니다.`);
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto relative bg-[#F8F9FE]">
                    
                    {/* 가상 토스트 알림 */}
                    {toast && (
                        <div className="fixed top-0 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-[340px] animate-toast">
                            <div className="bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-start gap-3 border border-slate-700">
                                <div className="bg-blue-500 p-2 rounded-xl text-white">
                                    <Icon.Bell active />
                                </div>
                                <div className="flex-1">
                                    <p className="font-black text-sm">{toast.title}</p>
                                    <p className="text-xs text-slate-400 mt-0.5">{toast.message}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="p-8 bg-white rounded-b-[40px] shadow-sm shrink-0">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-xl font-black text-blue-600 flex items-center gap-2 tracking-tighter">
                                <Icon.Sparkles /> CLEANLY
                            </h1>
                            <button 
                                onClick={() => showNotification("테스트 알림", "시스템 알림과 앱 알림이 동시에 작동하는지 확인합니다.")}
                                className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 tap-active"
                            >
                                <Icon.Bell active={false} />
                            </button>
                        </div>
                        <div className="space-y-1">
                            <p className="text-4xl font-black text-slate-900 tracking-tight">청소 체크리스트</p>
                            <p className="text-sm font-bold text-slate-400">오늘은 어떤 곳을 깨끗하게 해볼까요?</p>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto px-6 py-6 pb-32 no-scrollbar">
                        <div className="space-y-4">
                            {tasks.map(task => (
                                <div key={task.id} className="bg-white rounded-[32px] p-6 shadow-sm border border-slate-50 flex items-center gap-4">
                                    <div className="flex-1">
                                        <h3 className="font-black text-slate-800 text-lg mb-1">{task.name}</h3>
                                        <p className="text-xs font-bold text-slate-400">{task.frequencyDays}일 주기</p>
                                    </div>
                                    <button 
                                        onClick={() => completeTask(task.id)}
                                        className="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-100 tap-active"
                                    >
                                        <Icon.Check />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Footer FAB */}
                    <div className="absolute bottom-10 left-0 right-0 px-8 flex justify-center">
                        <button 
                            onClick={() => setModal(true)}
                            className="bg-slate-900 text-white w-full py-5 rounded-3xl font-black shadow-2xl flex items-center justify-center gap-2 tap-active"
                        >
                            <Icon.Plus /> 새로운 청소 추가
                        </button>
                    </div>

                    {/* Add Modal */}
                    {modal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-end">
                            <div className="bg-white w-full rounded-t-[40px] p-8 pb-12 animate-slide-up">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black text-slate-800">새 청소 등록</h2>
                                    <button onClick={() => setModal(false)} className="text-slate-300"><Icon.X /></button>
                                </div>
                                <input 
                                    autoFocus
                                    value={formName}
                                    onChange={e => setFormName(e.target.value)}
                                    placeholder="청소할 곳을 입력하세요"
                                    className="w-full bg-slate-50 border-none rounded-2xl p-5 font-bold mb-6 focus:ring-2 focus:ring-blue-500 outline-none"
                                />
                                <button 
                                    onClick={addTask}
                                    className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl tap-active"
                                >
                                    추가하기
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
