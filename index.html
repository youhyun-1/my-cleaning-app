<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cleanly - 우리집 청소 알리미</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8F9FE; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #2563eb;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = {
            Sparkles: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            ),
            Plus: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ),
            Trash2: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            ),
            Sun: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            ),
            Calendar: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ),
            Repeat: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
            ),
            Clock: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ),
            X: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            ),
            Check: () => (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            ),
            Edit2: () => (
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            ),
            History: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            )
        };

        const DAYS_KOR = ['일', '월', '화', '수', '목', '금', '토'];
        
        const getTodayString = () => {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        };

        const calculateStatus = (task) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let nextDate;

            if (task.mode === 'once') {
                nextDate = new Date(task.targetDate || getTodayString());
            } else if (task.mode === 'weekly') {
                let checkDate = new Date(task.lastCleaned === '2000-01-01' ? '2020-01-01' : task.lastCleaned);
                checkDate.setDate(checkDate.getDate() + 1);
                if (checkDate < today) checkDate = new Date(today);
                
                for (let i = 0; i < 14; i++) {
                    if (task.daysOfWeek?.includes(checkDate.getDay())) {
                        nextDate = new Date(checkDate);
                        break;
                    }
                    checkDate.setDate(checkDate.getDate() + 1);
                }
            } else {
                const last = new Date(task.lastCleaned === '2000-01-01' ? '2020-01-01' : task.lastCleaned);
                nextDate = new Date(last);
                if (task.lastCleaned === '2000-01-01') nextDate = new Date(today);
                else nextDate.setDate(nextDate.getDate() + Number(task.frequencyDays || 1));
            }
            
            if (!nextDate) nextDate = new Date(today);
            nextDate.setHours(0,0,0,0);
            
            const diffTime = nextDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return { status: 'overdue', days: Math.abs(diffDays) };
            if (diffDays === 0) return { status: 'today', days: 0 };
            return { status: 'upcoming', days: diffDays };
        };

        function App() {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('cleanly-v7-tasks');
                return saved ? JSON.parse(saved) : [];
            });

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('cleanly-v7-history');
                return saved ? JSON.parse(saved) : [];
            });

            const [view, setView] = useState('main'); // 'main' or 'history'
            const [modal, setModal] = useState({ open: false, mode: 'add', targetId: null });
            const [form, setForm] = useState({
                name: '',
                mode: 'interval',
                frequencyDays: 3,
                daysOfWeek: [],
                targetDate: getTodayString()
            });

            useEffect(() => {
                localStorage.setItem('cleanly-v7-tasks', JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                localStorage.setItem('cleanly-v7-history', JSON.stringify(history));
            }, [history]);

            const sortedTasks = useMemo(() => {
                return tasks.map(t => ({ ...t, ...calculateStatus(t) }))
                            .sort((a, b) => {
                                if (a.status === 'overdue' && b.status !== 'overdue') return -1;
                                if (b.status === 'overdue' && a.status !== 'overdue') return 1;
                                return a.days - b.days;
                            });
            }, [tasks]);

            const handleOpenModal = (mode, task = null) => {
                if (mode === 'edit' && task) {
                    setForm({ ...task });
                    setModal({ open: true, mode: 'edit', targetId: task.id });
                } else {
                    setForm({ name: '', mode: 'interval', frequencyDays: 3, daysOfWeek: [], targetDate: getTodayString() });
                    setModal({ open: true, mode: 'add', targetId: null });
                }
            };

            const saveTask = () => {
                if (!form.name.trim()) return;
                if (modal.mode === 'add') {
                    setTasks([...tasks, { ...form, id: Date.now(), lastCleaned: '2000-01-01' }]);
                } else {
                    setTasks(tasks.map(t => t.id === modal.targetId ? { ...form, id: t.id, lastCleaned: t.lastCleaned } : t));
                }
                setModal({ open: false, mode: 'add', targetId: null });
            };

            const toggleDay = (day) => {
                setForm(prev => ({
                    ...prev,
                    daysOfWeek: prev.daysOfWeek.includes(day) 
                        ? prev.daysOfWeek.filter(d => d !== day) 
                        : [...prev.daysOfWeek, day]
                }));
            };

            const completeTask = (id) => {
                const task = tasks.find(t => t.id === id);
                const now = new Date();
                const timeString = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                // 이력 추가
                const newHistoryItem = {
                    id: Date.now(),
                    taskName: task.name,
                    date: getTodayString(),
                    time: timeString
                };
                setHistory([newHistoryItem, ...history].slice(0, 50)); // 최근 50개까지만 유지

                if (task.mode === 'once') {
                    setTasks(tasks.filter(t => t.id !== id));
                } else {
                    setTasks(tasks.map(t => t.id === id ? { ...t, lastCleaned: getTodayString() } : t));
                }
            };

            const deleteHistory = (id) => {
                setHistory(history.filter(h => h.id !== id));
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto relative overflow-hidden bg-[#F8F9FE]">
                    {/* 상단 헤더: 날짜 강조 */}
                    <header className="px-6 pt-10 pb-8 bg-white border-b border-slate-50 shrink-0 shadow-sm rounded-b-[40px] z-10">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-xl font-black text-blue-600 flex items-center gap-1.5 tracking-tighter">
                                <Icon.Sparkles /> CLEANLY
                            </h1>
                            <div className="bg-amber-50 px-3 py-1.5 rounded-full flex items-center gap-2 text-amber-600 border border-amber-100/50">
                                <Icon.Sun />
                                <span className="font-black text-xs">18°C</span>
                            </div>
                        </div>
                        <div className="space-y-1">
                            <p className="text-4xl font-black text-slate-900 tracking-tight">
                                {new Date().getDate()}<span className="text-lg text-slate-400 ml-1">일</span>
                            </p>
                            <p className="text-sm font-bold text-slate-400 flex items-center gap-2 uppercase">
                                {new Date().getFullYear()}년 {new Date().getMonth() + 1}월 • {DAYS_KOR[new Date().getDay()]}요일
                            </p>
                        </div>
                    </header>

                    {/* 뷰 전환 탭 */}
                    <nav className="flex px-6 mt-6 gap-4 shrink-0">
                        <button 
                            onClick={() => setView('main')}
                            className={`flex-1 py-3 rounded-2xl font-black text-sm transition-all ${view === 'main' ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white text-slate-400 border border-slate-100'}`}
                        >
                            할 일
                        </button>
                        <button 
                            onClick={() => setView('history')}
                            className={`flex-1 py-3 rounded-2xl font-black text-sm transition-all ${view === 'history' ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white text-slate-400 border border-slate-100'}`}
                        >
                            기록
                        </button>
                    </nav>

                    <main className="flex-1 overflow-y-auto px-6 py-6 pb-32 no-scrollbar">
                        {view === 'main' ? (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center px-1">
                                    <h2 className="text-lg font-black text-slate-800">청소 목록</h2>
                                    <span className="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded-full">{sortedTasks.length}개 남음</span>
                                </div>
                                {sortedTasks.length === 0 ? (
                                    <div className="py-20 text-center flex flex-col items-center gap-4">
                                        <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-300">
                                            <Icon.Check />
                                        </div>
                                        <p className="opacity-30 font-bold">모든 청소가 끝났어요!</p>
                                    </div>
                                ) : (
                                    sortedTasks.map(task => (
                                        <div key={task.id} className="bg-white rounded-[28px] p-5 shadow-sm border border-slate-100 flex items-center gap-4 active:scale-[0.98] transition-all">
                                            <div className="flex-1" onClick={() => handleOpenModal('edit', task)}>
                                                <div className="flex items-center gap-2 text-slate-800">
                                                    <h3 className="font-bold leading-tight">{task.name}</h3>
                                                    <Icon.Edit2 />
                                                </div>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-black ${
                                                        task.status === 'overdue' ? 'bg-red-50 text-red-500' : 
                                                        task.status === 'today' ? 'bg-blue-50 text-blue-600' : 'bg-slate-100 text-slate-400'
                                                    }`}>
                                                        {task.status === 'overdue' ? `지연 D+${task.days}` : task.status === 'today' ? 'TODAY' : `D-${task.days}`}
                                                    </span>
                                                    <span className="text-[10px] text-slate-300 font-bold">
                                                        {task.mode === 'interval' && `${task.frequencyDays}일 주기`}
                                                        {task.mode === 'weekly' && `매주 ${task.daysOfWeek.map(d => DAYS_KOR[d]).join(',')}`}
                                                        {task.mode === 'once' && '일회성'}
                                                    </span>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); completeTask(task.id); }}
                                                className="w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center shadow-lg shadow-blue-100"
                                            >
                                                <Icon.Check />
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <h2 className="text-lg font-black text-slate-800 px-1">최근 완료 기록</h2>
                                {history.length === 0 ? (
                                    <div className="py-20 text-center opacity-30 font-bold">아직 완료한 청소가 없어요</div>
                                ) : (
                                    history.map(h => (
                                        <div key={h.id} className="bg-white/60 rounded-2xl p-4 flex items-center gap-4 border border-slate-100">
                                            <div className="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center text-green-500">
                                                <Icon.Check />
                                            </div>
                                            <div className="flex-1">
                                                <h4 className="text-sm font-bold text-slate-800">{h.taskName}</h4>
                                                <p className="text-[10px] text-slate-400 font-medium">{h.date} • {h.time}</p>
                                            </div>
                                            <button onClick={() => deleteHistory(h.id)} className="text-slate-200 p-2">
                                                <Icon.Trash2 />
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    {/* 플로팅 버튼 - '할 일' 뷰에서만 노출 */}
                    {view === 'main' && (
                        <button 
                            onClick={() => handleOpenModal('add')}
                            className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full font-black shadow-2xl flex items-center gap-2 active:scale-95 transition-transform z-40"
                        >
                            <Icon.Plus /> 추가하기
                        </button>
                    )}

                    {/* 모달 (기존 동일) */}
                    {modal.open && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex flex-col justify-end">
                            <div className="bg-white rounded-t-[40px] p-8 pb-12 animate-slide-up shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-black text-slate-800">{modal.mode === 'add' ? '새 청소 추가' : '청소 정보 수정'}</h3>
                                    <button onClick={() => setModal({ open: false, mode: 'add', targetId: null })} className="text-slate-300"><Icon.X /></button>
                                </div>

                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[11px] font-black text-slate-400 ml-1">이름</label>
                                        <input 
                                            value={form.name}
                                            onChange={e => setForm({...form, name: e.target.value})}
                                            className="w-full bg-slate-50 rounded-2xl p-5 font-bold outline-none focus:ring-2 focus:ring-blue-500" 
                                            placeholder="예: 욕실 청소, 분리수거"
                                        />
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[11px] font-black text-slate-400 ml-1">반복 모드</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[
                                                { id: 'interval', label: '주기', icon: <Icon.Clock/> },
                                                { id: 'weekly', label: '요일', icon: <Icon.Repeat/> },
                                                { id: 'once', label: '한번', icon: <Icon.Calendar/> }
                                            ].map(m => (
                                                <button 
                                                    key={m.id}
                                                    onClick={() => setForm({...form, mode: m.id})}
                                                    className={`py-3 rounded-xl font-bold text-xs flex flex-col items-center gap-1 border-2 transition-all ${
                                                        form.mode === m.id ? 'bg-blue-50 border-blue-500 text-blue-600' : 'bg-slate-50 border-transparent text-slate-400'
                                                    }`}
                                                >
                                                    {m.icon} {m.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="p-5 bg-slate-50 rounded-[28px]">
                                        {form.mode === 'interval' && (
                                            <div className="space-y-4">
                                                <div className="flex justify-between text-sm font-bold">
                                                    <span>반복 주기</span>
                                                    <span className="text-blue-600">{form.frequencyDays}일 마다</span>
                                                </div>
                                                <input 
                                                    type="range" min="1" max="30" 
                                                    value={form.frequencyDays}
                                                    onChange={e => setForm({...form, frequencyDays: e.target.value})}
                                                    className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                                />
                                            </div>
                                        )}
                                        {form.mode === 'weekly' && (
                                            <div className="space-y-3">
                                                <p className="text-xs font-bold text-slate-500 text-center">반복할 요일을 선택하세요</p>
                                                <div className="flex justify-between">
                                                    {DAYS_KOR.map((day, idx) => (
                                                        <button 
                                                            key={day}
                                                            onClick={() => toggleDay(idx)}
                                                            className={`w-9 h-9 rounded-full font-black text-xs transition-all ${
                                                                form.daysOfWeek.includes(idx) ? 'bg-blue-600 text-white' : 'bg-white text-slate-300'
                                                            }`}
                                                        >
                                                            {day}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {form.mode === 'once' && (
                                            <div className="space-y-2">
                                                <p className="text-xs font-bold text-slate-500">수행할 날짜 선택</p>
                                                <input 
                                                    type="date" 
                                                    value={form.targetDate}
                                                    onChange={e => setForm({...form, targetDate: e.target.value})}
                                                    className="w-full p-3 rounded-xl bg-white font-bold outline-none"
                                                />
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-3 pt-4">
                                        {modal.mode === 'edit' && (
                                            <button 
                                                onClick={() => {
                                                    if(confirm('이 항목을 삭제할까요?')) {
                                                        setTasks(tasks.filter(t => t.id !== modal.targetId));
                                                        setModal({ open: false, mode: 'add', targetId: null });
                                                    }
                                                }}
                                                className="bg-red-50 text-red-500 w-16 rounded-2xl flex items-center justify-center"
                                            >
                                                <Icon.Trash2 />
                                            </button>
                                        )}
                                        <button 
                                            onClick={saveTask}
                                            className="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-blue-100"
                                        >
                                            {modal.mode === 'add' ? '등록하기' : '수정완료'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
